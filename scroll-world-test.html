<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll World AAPSON — 1 vídeo contínuo (teste local)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap');
  :root{
    --bg:#0B0714; --fg:#EFE9FF; --ink:#0B0714;
    --a1:#A78BFA; --a2:#D9F03A; --a3:#C8743C;
    --font-display:"Fraunces",Georgia,serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font-display); background:var(--bg); color:var(--fg); }
  /* O vídeo único ocupa a tela; o scroll avança o tempo dele (sem cortes). */
  .stage { position:fixed; inset:0; width:100vw; height:100vh; }
  .stage video { width:100%; height:100%; object-fit:cover; }
  /* overlay de texto que aparece conforme o progresso */
  .caption { position:fixed; left:0; right:0; bottom:14vh; text-align:center; padding:0 8vw;
             pointer-events:none; transition:opacity 0.4s ease; }
  .eyebrow { font-size:0.9rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--a1); font-weight:600; }
  .caption h2 { font-size:clamp(1.8rem,5vw,3.4rem); font-weight:700; margin-top:8px; text-shadow:0 2px 30px rgba(0,0,0,0.6); }
  .hint { position:fixed; bottom:22px; left:0; right:0; text-align:center; font-size:13px; opacity:0.5; }
  .wrap { height:500vh; } /* scroll "falso" que controla o vídeo */
</style>
</head>
<body>
  <div class="stage"><video id="vid" src="assets/scrollworld/scrollworld_unico.mp4" muted playsinline preload="auto"></video></div>
  <div class="caption" id="cap">
    <div class="eyebrow" id="eyeb">AAPSON · Scroll World</div>
    <h2 id="tit">O cliente some no meio da jornada</h2>
  </div>
  <div class="hint" id="hint">role para avançar o filme — 1 vídeo contínuo, sem cortes</div>
  <div class="wrap" id="wrap"></div>

<script>
  const vid = document.getElementById('vid');
  const eyeb = document.getElementById('eyeb'), tit = document.getElementById('tit'), cap = document.getElementById('cap');
  const BEATS = [
    ["AAPSON · Scroll World", "O cliente some no meio da jornada"],
    ["O problema dele", "A gente mostra o problema, no dele"],
    ["A solução AAPSON", "Sua solução, encenada em filme"],
    ["Pronto pra fechar", "Site cinematográfico AAPSON — fale no WhatsApp"],
    ["AAPSON", "Quer o site da sua empresa assim?"],
  ];
  function onScroll(){
    const top = document.getElementById('wrap').getBoundingClientRect().top;
    const total = document.getElementById('wrap').scrollHeight - window.innerHeight;
    const p = Math.min(1, Math.max(0, -top / (total||1)));
    if (vid.duration) vid.currentTime = p * vid.duration;
    const idx = Math.min(BEATS.length-1, Math.floor(p * BEATS.length));
    eyeb.textContent = BEATS[idx][0];
    tit.textContent  = BEATS[idx][1];
  }
  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('load', onScroll);
  onScroll();
</script>
</body>
</html>
